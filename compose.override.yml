services:
  db:
    restart: "no"
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-55432}:5432"

  adminer:
    image: adminer
    restart: "no"
    ports:
      - "127.0.0.1:8080:8080"
    profiles:
      - debug
    depends_on:
      - db
    environment:
      ADMINER_DESIGN: pepa-linha-dark

  backend:
    restart: "no"
    ports:
      - "8000:8000"
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - fastapi
      - run
      - --reload
      - "app/main.py"
    volumes:
      - ./backend/htmlcov:/app/backend/htmlcov

  frontend:
    restart: "no"
    ports:
      - "5173:80"
    environment:
      API_BASE_URL: http://localhost:8000
      SUPABASE_URL: ${SUPABASE_URL:-http://127.0.0.1:55321}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-}

  playwright:
    build:
      context: .
      dockerfile: frontend/Dockerfile.playwright
    profiles:
      - test
    ipc: host
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      API_BASE_URL: http://backend:8000
      VITE_SUPABASE_URL: http://host.docker.internal:55321
      VITE_SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-}
      MAILPIT_HOST: http://host.docker.internal:55324
      PLAYWRIGHT_HTML_HOST: 0.0.0.0
      CI: ${CI:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./frontend/blob-report:/app/frontend/blob-report
      - ./frontend/test-results:/app/frontend/test-results
    ports:
      - "9323:9323"
