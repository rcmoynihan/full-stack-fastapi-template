services:
  db:
    restart: "no"
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-55432}:5432"

  adminer:
    image: adminer
    restart: "no"
    ports:
      - "127.0.0.1:8080:8080"
    profiles:
      - debug
    depends_on:
      - db
    environment:
      ADMINER_DESIGN: pepa-linha-dark

  backend:
    restart: "no"
    ports:
      - "8000:8000"
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - fastapi
      - run
      - --reload
      - "app/main.py"
    volumes:
      - ./backend/htmlcov:/app/backend/htmlcov
    environment:
      SMTP_HOST: mailcatcher
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: noreply@example.com

  mailcatcher:
    image: schickling/mailcatcher
    ports:
      - "1080:1080"
      - "1025:1025"

  frontend:
    restart: "no"
    ports:
      - "5173:80"
    environment:
      API_BASE_URL: http://localhost:8000

  playwright:
    build:
      context: .
      dockerfile: frontend/Dockerfile.playwright
    profiles:
      - test
    ipc: host
    depends_on:
      - backend
      - mailcatcher
    env_file:
      - .env
    environment:
      API_BASE_URL: http://backend:8000
      MAILCATCHER_HOST: http://mailcatcher:1080
      PLAYWRIGHT_HTML_HOST: 0.0.0.0
      CI: ${CI:-}
    volumes:
      - ./frontend/blob-report:/app/frontend/blob-report
      - ./frontend/test-results:/app/frontend/test-results
    ports:
      - "9323:9323"
