name: Test Docker Compose

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize

jobs:

  test-docker-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Supabase CLI
        run: bash scripts/install-supabase-cli.sh
      - name: Start Supabase Auth
        run: bash scripts/supabase-local.sh start
      - run: bash scripts/docker-compose-local.sh build
      - run: bash scripts/docker-compose-local.sh down -v --remove-orphans
      - run: bash scripts/docker-compose-local.sh up -d --wait backend frontend
      - name: Test backend is up
        run: curl --fail http://localhost:8000/api/v1/utils/health-check/
      - name: Test frontend is up
        run: curl --fail http://localhost:5173
      - run: bash scripts/docker-compose-local.sh down -v --remove-orphans
        if: always()
      - name: Stop Supabase Auth
        run: bash scripts/supabase-local.sh stop
        if: always()
