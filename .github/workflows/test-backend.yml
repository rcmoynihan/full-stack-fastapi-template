name: Test Backend

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - name: Install Supabase CLI
        run: bash scripts/install-supabase-cli.sh
      - run: docker compose down -v --remove-orphans
      - name: Start Supabase Auth
        run: bash scripts/supabase-local.sh start
      - run: docker compose up -d db
      - name: Migrate DB
        run: uv run bash scripts/prestart.sh
        working-directory: backend
        env:
          DATABASE_URL: ""
          DATABASE_URL_DIRECT: ""
          ENVIRONMENT: local
          POSTGRES_SERVER: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changethis
      - name: Run tests
        run: uv run bash scripts/tests-start.sh
        working-directory: backend
        env:
          DATABASE_URL: ""
          DATABASE_URL_DIRECT: ""
          ENVIRONMENT: local
          POSTGRES_SERVER: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changethis
      - run: docker compose down -v --remove-orphans
        if: always()
      - name: Stop Supabase Auth
        run: bash scripts/supabase-local.sh stop
        if: always()
      - name: Store coverage files
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-html
          path: backend/htmlcov
          include-hidden-files: true
      - name: Coverage report
        run: uv run coverage report --fail-under=92
        working-directory: backend
