app = "myapp-backend-prod"
primary_region = "iad"

[build]
  # Image provided by CI.

[deploy]
  release_command = "bash scripts/migrate.sh"
  release_command_timeout = "10m"
  strategy = "bluegreen"

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/api/v1/utils/health-check/"
  port = 8000
  timeout = "5s"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
